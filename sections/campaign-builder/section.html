<!-- Campaign Builder — mounted into #p-builder by the dashboard loader.
     No .page wrapper and no <script> here (the loader adds those). -->
<div class="cb-topbar">
  <div class="cb-tb-l">
    <span class="cb-brand">Campaign Builder</span>
    <span class="cb-brand-sub">Build &amp; tag a campaign, then export the Word doc</span>
  </div>
  <div class="cb-tb-r">
    <span id="cbDraftState" class="cb-draft-state"></span>
    <span id="cb-status"></span>
    <button class="cb-mini" data-draftsave>Save draft</button>
    <button class="cb-mini" data-draftload>Load draft</button>
    <button class="cb-mini" data-import>Import .docx</button>
    <button class="cb-mini cb-danger" data-draftfresh>Start fresh</button>
    <button class="cb-primary" data-gen>Generate Word doc</button>
  </div>
</div>

<div class="cb-scope-row" id="cb-scope"></div>

<div class="cb-panes">
  <aside class="cb-tree" id="cb-tree"></aside>
  <main class="cb-editor" id="cb-editor"></main>
  <aside class="cb-rail" id="cb-rail"></aside>
</div>

<div id="cb-toast" class="cb-toast"></div>
<input type="file" id="cb-importfile" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" hidden>
<input type="file" id="cb-draftfile" accept=".json,application/json" hidden>
<datalist id="cb-timeopts"></datalist>
