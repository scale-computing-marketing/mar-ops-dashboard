<!-- Executive Overview — section markup (mounted into #p-exec-overview by the loader) -->
<header class="ed-masthead">
  <p class="ed-kicker">SC//Leadership · Executive Overview</p>
  <h1>Executive Overview <em>— the signal</em></h1>
  <p class="ed-lede">A leadership read on the ADR engine: headline outcomes, what's moving, and where to look — for a window you choose. Figures roll up the Math of Sales quarterly data, so ranges snap to whole quarters.</p>
</header>

<div class="eo-controls">
  <span class="eo-ctl-label">Date range</span>
  <div class="eo-presets">
    <button class="eo-preset" data-eo-preset="30d">Last 30 days</button>
    <button class="eo-preset" data-eo-preset="quarter">Quarter</button>
    <button class="eo-preset" data-eo-preset="6m">6 months</button>
    <button class="eo-preset" data-eo-preset="9m">9 months</button>
    <button class="eo-preset on" data-eo-preset="year">Year</button>
    <button class="eo-preset" data-eo-preset="custom">Custom…</button>
  </div>
  <div class="eo-custom" id="eo-custom">
    <label class="eo-date">From <input type="date" id="eo-start" min="2021-07-01" max="2026-06-30"></label>
    <label class="eo-date">To <input type="date" id="eo-end" min="2021-07-01" max="2026-06-30"></label>
    <button class="eo-apply" id="eo-apply">Apply</button>
  </div>
</div>

<div id="eo-body"></div>
